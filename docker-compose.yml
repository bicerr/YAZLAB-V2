version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - internal

  dispatcher:
    build:
      context: ./gateway/Dispatcher
      dockerfile: Dispatcher.Api/Dockerfile
    container_name: dispatcher
    ports:
      - "5100:8080"
    depends_on:
      - mongodb
    networks:
      - internal
      - external

  auth-service:
    build:
      context: ./services/AuthService
      dockerfile: AuthService.Api/Dockerfile
    container_name: auth-service
    depends_on:
      - mongodb
    networks:
      - internal

  product-service:
    build:
      context: ./services/ProductService
      dockerfile: ProductService.Api/Dockerfile
    container_name: product-service
    depends_on:
      - mongodb
    networks:
      - internal

  order-service:
    build:
      context: ./services/OrderService
      dockerfile: OrderService.Api/Dockerfile
    container_name: order-service
    depends_on:
      - mongodb
    networks:
      - internal

  notification-service:
    build:
      context: ./services/NotificationService
      dockerfile: NotificationService.Api/Dockerfile
    container_name: notification-service
    depends_on:
      - mongodb
    networks:
      - internal    

  payment-service:
    build:
      context: ./services/PaymentService
      dockerfile: PaymentService.Api/Dockerfile
    container_name: payment-service
    depends_on:
      - mongodb
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - internal
      - external

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - internal
      - external

volumes:
  mongo_data:

networks:
  internal:
    internal: true
  external:
    internal: false